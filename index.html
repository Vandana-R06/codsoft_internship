<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Scientific Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="calculator">

  <!-- Display -->
  <div class="display">
    <div id="history"></div>
    <input type="text" id="result" placeholder="0" readonly>
  </div>

  <!-- Buttons -->
  <div class="buttons">

    <!-- Row 1 -->
    <button class="operator" onclick="clearAll()">AC</button>
    <button onclick="clearEntry()">C</button>
    <button onclick="backspace()">⌫</button>
    <button class="operator" onclick="append('%')">%</button>

    <!-- Row 2 -->
    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="operator" onclick="append('/')">÷</button>

    <!-- Row 3 -->
    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="operator" onclick="append('*')">×</button>

    <!-- Row 4 -->
    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="operator" onclick="append('-')">−</button>

    <!-- Row 5 -->
    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
    <button class="operator" onclick="append('+')">+</button>

    <!-- Scientific -->
    <button onclick="square()">x²</button>
    <button onclick="sqrt()">√</button>
    <button onclick="power()">xʸ</button>
    <button onclick="factorial()">!</button>

    <button onclick="sin()">sin</button>
    <button onclick="cos()">cos</button>
    <button onclick="tan()">tan</button>
    <button onclick="toggleMode()">DEG</button>

    <button onclick="log()">log</button>
    <button onclick="ln()">ln</button>
    <button onclick="exp()">eˣ</button>
    <button onclick="abs()">|x|</button>

    <!-- Memory -->
    <button onclick="memoryClear()">MC</button>
    <button onclick="memoryRecall()">MR</button>
    <button onclick="memoryAdd()">M+</button>
    <button onclick="memorySubtract()">M-</button>

  </div>

  <!-- History Panel -->
  <div class="history-panel">
    <h3>History</h3>
    <ul id="historyList"></ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
